<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untitled Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0f12;
      background-image: radial-gradient(circle at 20% 30%, #1a1e24 0%, #0b0d0f 90%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      color: #e3e6ea;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .game-hub {
      max-width: 1200px;
      width: 100%;
      background: rgba(12, 15, 20, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #2c313a;
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #2f3540 inset;
      transition: all 0.2s ease;
    }

    h1 {
      font-weight: 500;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      color: #eceff4;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    h1 small {
      font-size: 1rem;
      font-weight: 350;
      color: #8f9aa8;
      background: #1e232b;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      border: 1px solid #323842;
      letter-spacing: 0.3px;
    }

    .subhead {
      color: #a6b0c0;
      margin-bottom: 2.2rem;
      border-left: 3px solid #4f5b6b;
      padding-left: 1rem;
      font-weight: 350;
      font-size: 0.95rem;
      letter-spacing: 0.2px;
    }

    /* top bar: count + search */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.8rem;
    }

    .games-count {
      color: #58a6ff;
      font-size: 0.85rem;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: #181c24;
      border: 1px solid #2b313c;
      border-radius: 40px;
      padding: 0.3rem 0.3rem 0.3rem 1rem;
      transition: border 0.15s;
    }

    .search-wrapper:focus-within {
      border-color: #4f5d72;
      background: #1f2631;
    }

    .search-wrapper input {
      background: transparent;
      border: none;
      outline: none;
      color: #e3e6ea;
      font-family: inherit;
      font-size: 0.85rem;
      width: 160px;
      padding: 0.3rem 0;
      letter-spacing: 0.2px;
    }

    .search-wrapper input::placeholder {
      color: #6a7a8c;
      font-weight: 350;
    }

    .search-wrapper button {
      background: #262e3a;
      border: none;
      color: #bcc6d4;
      font-size: 0.75rem;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      letter-spacing: 0.3px;
      border: 1px solid #3a4250;
      margin-left: 0.3rem;
    }

    .search-wrapper button:hover {
      background: #2f3848;
      color: white;
      border-color: #5a6a80;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem 1rem;
      margin: 0.8rem 0 0.8rem;
    }

    .game-card {
      background: #181c24;
      border: 1px solid #2b313c;
      border-radius: 1.8rem;
      padding: 1rem 0.8rem;
      color: #d3dbe6;
      font-weight: 450;
      font-size: 0.95rem;
      text-align: center;
      transition: all 0.15s ease;
      box-shadow: 0 4px 0 #0a0c0f;
      cursor: pointer;
      backdrop-filter: blur(4px);
      background: rgba(26, 31, 40, 0.7);
      letter-spacing: 0.2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 120px;
      word-break: break-word;
      line-height: 1.3;
    }

    .game-card:hover {
      background: #262e3a;
      border-color: #4f5d72;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #0a0c0f;
      color: white;
    }

    .game-card:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0a0c0f;
      background: #1f2631;
    }

    .game-card h3 {
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .game-card .category-badge {
      font-size: 0.65rem;
      background: #2a3340;
      color: #8f9aa8;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      margin-top: 0.1rem;
      margin-bottom: 0.4rem;
      display: inline-block;
    }

    .game-card .description-text {
      font-size: 0.7rem;
      color: #7a8799;
      line-height: 1.3;
      margin-top: 0.2rem;
      padding: 0 0.3rem;
      font-weight: 350;
    }

    /* Fullscreen iframe overlay */
    .game-frame-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #07090c;
      z-index: 9999;
      display: none;
      flex-direction: column;
      backdrop-filter: blur(2px);
      animation: fadeIn 0.2s ease;
    }

    .game-frame-container.active {
      display: flex;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .game-frame-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0.8rem 1.5rem;
      background: #0f1218;
      border-bottom: 1px solid #2a303b;
      flex-shrink: 0;
    }

    .back-btn {
      background: #1f2631;
      border: 1px solid #3a4250;
      color: #d3dbe6;
      padding: 0.5rem 1.6rem;
      border-radius: 40px;
      font-weight: 480;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 0 #0b0e12;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(4px);
      background: rgba(28, 34, 44, 0.8);
    }

    .back-btn:hover {
      background: #2f3848;
      border-color: #5a6a80;
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #0b0e12;
    }

    .back-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0b0e12;
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .game-iframe-wrapper {
      flex: 1;
      width: 100%;
      background: #0b0d10;
      position: relative;
    }

    .game-iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0f1217;
      display: block;
    }

    /* Custom loading screen inside iframe overlay */
    .custom-loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0d10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    .custom-loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #2a303b;
      border-top: 4px solid #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text-custom {
      color: #8f9aa8;
      font-size: 1.1rem;
      letter-spacing: 1px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .loading-game-name {
      color: #58a6ff;
      font-size: 0.9rem;
      margin-top: 10px;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .game-hub {
        padding: 1.8rem 1.2rem;
        border-radius: 2rem;
      }
      h1 {
        font-size: 1.8rem;
        flex-wrap: wrap;
      }
      .game-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.8rem;
      }
      .game-card {
        min-height: 100px;
        font-size: 0.85rem;
        padding: 0.8rem 0.5rem;
        border-radius: 1.4rem;
      }
      .back-btn {
        padding: 0.4rem 1.2rem;
        font-size: 0.8rem;
      }
      .search-wrapper input {
        width: 110px;
      }
    }

    ::selection {
      background: #4f6b8a;
      color: #f0f4fc;
    }

    ::-webkit-scrollbar {
      width: 6px;
      background: #14181f;
    }
    ::-webkit-scrollbar-thumb {
      background: #38404d;
      border-radius: 20px;
    }
  </style>
</head>

      // DOM elements
      const grid = document.getElementById('gameGrid');
      const frameContainer = document.getElementById('gameFrameContainer');
      const gameIframe = document.getElementById('gameIframe');
      const backBtn = document.getElementById('backBtn');
      const gamesCount = document.getElementById('gamesCount');
      const customLoadingScreen = document.getElementById('customLoadingScreen');
      const loadingGameName = document.getElementById('loadingGameName');
      const searchInput = document.getElementById('searchInput');
      const searchClearBtn = document.getElementById('searchClearBtn');

      // 🚀 LOAD HARDCODED GAMES
      function loadGames() {
        // Update UI with hardcoded games
        gamesCount.textContent = `🎮 ${GamesData.length} games loaded`;
        
        renderGrid(GamesData);
        console.log(`✅ Engine loaded ${GamesData.length} hardcoded games`);
      }

      // render grid based on data array
      function renderGrid(data) {
        if (data.length === 0) {
          grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#6a7a8c; padding:2rem 0;">no games match your filter</div>`;
          return;
        }
        grid.innerHTML = data.map(game => `
          <div class="game-card" 
               data-game-url="${game.url}" 
               data-game-name="${game.name}" 
               data-game-title="${game.name}"
               data-game-category="${game.category}"
               data-game-description="${game.description}">
            <h3>${game.name}</h3>
            <span class="category-badge">${game.category}</span>
            <div class="description-text">${game.description}</div>
          </div>
        `).join('');
      }

      // 🔍 FILTER FUNCTION
      function filterGames() {
        const query = searchInput.value.toLowerCase().trim();
        let filtered;
        if (query === '') {
          filtered = GamesData;
        } else {
          filtered = GamesData.filter(game => 
            game.name.toLowerCase().includes(query) ||
            game.category.toLowerCase().includes(query) ||
            game.description.toLowerCase().includes(query)
          );
        }
        renderGrid(filtered);
        gamesCount.textContent = `🎮 ${filtered.length} / ${GamesData.length} games`;
      }

      // search input events
      searchInput.addEventListener('input', filterGames);
      searchClearBtn.addEventListener('click', function() {
        searchInput.value = '';
        filterGames();
        searchInput.focus();
      });

      // 🎮 EXECUTE GAME IN IFRAME - Uses the url field from each game
      document.addEventListener('click', async (e) => {
        if (e.target.closest('.game-card')) {
          const card = e.target.closest('.game-card');
          const gameUrl = card.getAttribute('data-game-url');
          const gameName = card.getAttribute('data-game-name');
          const gameTitle = card.getAttribute('data-game-title');
          
          try {
            // Show only the game title on the custom loading screen
            loadingGameName.textContent = gameTitle;
            
            // Show the custom loading screen
            customLoadingScreen.classList.remove('hidden');
            
            // Show the iframe overlay immediately
            frameContainer.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Set the iframe src directly to the game's URL
            gameIframe.src = gameUrl;
            
            // Push state for browser back button
            history.pushState({ game: true, url: gameUrl, name: gameName }, '');
            
          } catch (error) {
            console.error('Game error:', error);
            // Hide loading screen on error
            customLoadingScreen.classList.add('hidden');
            // Show error in iframe
            gameIframe.srcdoc = `<html><body style="background:#0b0d10;color:#f85149;display:flex;align-items:center;justify-content:center;font-family:sans-serif;flex-direction:column;"><h2>Failed to load game</h2><p style="color:#8b949e;font-size:14px;">${error.message}</p></body></html>`;
          }
        }
      });

      // Hide custom loading screen when iframe finishes loading
      gameIframe.addEventListener('load', function() {
        // Small delay to ensure the game has rendered
        setTimeout(() => {
          customLoadingScreen.classList.add('hidden');
        }, 300);
      });

      // Close game function
      function closeGame() {
        frameContainer.classList.remove('active');
        gameIframe.src = '';
        customLoadingScreen.classList.add('hidden');
        document.body.style.overflow = '';
        if (window.history.state && window.history.state.game) {
          window.history.back();
        }
      }

      // Back button event
      backBtn.addEventListener('click', closeGame);

      // Escape key to close
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && frameContainer.classList.contains('active')) {
          closeGame();
        }
      });

      // Handle browser back button
      window.addEventListener('popstate', function(e) {
        if (frameContainer.classList.contains('active')) {
          closeGame();
        }
      });

      // Prevent right-click on games
      document.addEventListener('contextmenu', (e) => {
        if (e.target.closest('.game-card')) e.preventDefault();
      });

      // 🏁 Initialize when DOM loads
      window.addEventListener('load', loadGames);
    })();
  </script>
